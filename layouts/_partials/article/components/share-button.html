{{/* Share button — desktop dropdown + mobile native share */}}
{{- $page := . -}}
<div class="share-button-wrapper">
    <button class="share-btn" aria-label="Share this article" onclick="handleShare(event, this)">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
            <polyline points="16 6 12 2 8 6"></polyline>
            <line x1="12" y1="2" x2="12" y2="15"></line>
        </svg>
    </button>
    <div class="share-dropdown" role="menu" aria-hidden="true">
        <a class="share-option" role="menuitem" href="#" onclick="shareWhatsApp(event)" target="_blank" rel="noopener noreferrer">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
            </svg>
            WhatsApp
        </a>
        <a class="share-option" role="menuitem" href="#" onclick="shareTwitter(event)" target="_blank" rel="noopener noreferrer">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            Twitter / X
        </a>
        <a class="share-option" role="menuitem" href="#" onclick="shareLinkedIn(event)" target="_blank" rel="noopener noreferrer">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            LinkedIn
        </a>
        <button class="share-option share-copy-btn" role="menuitem" onclick="copyLink(event, this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span class="copy-label">Copy Link</span>
        </button>
    </div>
</div>

<script>
(function () {
    function getPageUrl() {
        return window.location.href;
    }

    function getPageTitle() {
        return document.title;
    }

    function closeAllDropdowns() {
        document.querySelectorAll('.share-dropdown.open').forEach(function (d) {
            d.classList.remove('open');
            d.setAttribute('aria-hidden', 'true');
        });
    }

    window.handleShare = function (e, btn) {
        e.stopPropagation();

        if (navigator.share) {
            navigator.share({
                title: getPageTitle(),
                url: getPageUrl()
            }).catch(function () { /* user cancelled */ });
            return;
        }

        var dropdown = btn.nextElementSibling;
        var isOpen = dropdown.classList.contains('open');
        closeAllDropdowns();
        if (!isOpen) {
            dropdown.classList.add('open');
            dropdown.setAttribute('aria-hidden', 'false');
        }
    };

    window.shareWhatsApp = function (e) {
        e.preventDefault();
        var url = 'https://wa.me/?text=' + encodeURIComponent(getPageTitle() + ' ' + getPageUrl());
        window.open(url, '_blank', 'noopener,noreferrer');
        closeAllDropdowns();
    };

    window.shareTwitter = function (e) {
        e.preventDefault();
        var url = 'https://twitter.com/intent/tweet?url=' + encodeURIComponent(getPageUrl()) + '&text=' + encodeURIComponent(getPageTitle());
        window.open(url, '_blank', 'noopener,noreferrer');
        closeAllDropdowns();
    };

    window.shareLinkedIn = function (e) {
        e.preventDefault();
        var url = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(getPageUrl());
        window.open(url, '_blank', 'noopener,noreferrer');
        closeAllDropdowns();
    };

    window.copyLink = function (e, btn) {
        e.preventDefault();
        var label = btn.querySelector('.copy-label');
        navigator.clipboard.writeText(getPageUrl()).then(function () {
            label.textContent = 'Copied!';
            setTimeout(function () {
                label.textContent = 'Copy Link';
            }, 2000);
        }).catch(function () {
            /* fallback for older browsers */
            var input = document.createElement('input');
            input.value = getPageUrl();
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            label.textContent = 'Copied!';
            setTimeout(function () { label.textContent = 'Copy Link'; }, 2000);
        });
        closeAllDropdowns();
    };

    document.addEventListener('click', function () {
        closeAllDropdowns();
    });
})();
</script>
