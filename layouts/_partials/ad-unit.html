{{- if and .Site.Params.ads.enabled .slot -}}
<div class="ad-unit">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="{{ .Site.Params.ads.client }}"
         data-ad-slot="{{ .slot }}"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</div>
{{- end -}}
